<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you be my Valentine?</title>
    <style>
        body { background-color: #fce4ec; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; position: relative; }
        img { width: 100px; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 30px; }
        .btn-container { display: flex; justify-content: center; gap: 20px; height: 50px; }
        button { padding: 10px 25px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; }
        #yesBtn { background-color: #e91e63; color: white; }
        #noBtn { background-color: #eeeeee; color: #757575; position: absolute; transition: 0.1s; }
        p { font-size: 0.7rem; color: #9e9e9e; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="content" class="card">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eHByZzR0bm8ycXp6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3ImZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/c76IJLufpNUMo/giphy.gif" alt="Cat Illustration">
        <h1>[Her Name], will you be my valentine?</h1>
        <div class="btn-container">
            <button id="yesBtn" onclick="celebrate()">Yes</button>
            <button id="noBtn" onmouseover="moveButton()">No</button>
        </div>
        <p>"No" seems a bit shy 😻</p>
    </div>

    <script>
        function moveButton() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            const btn = document.getElementById('noBtn');
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function celebrate() {
            document.getElementById('content').innerHTML = `
                <h1>YAY! 🎉</h1>
                <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" style="width: 250px;">
                <p>Can't wait for our Valentine's Day!</p>
            `;
        }
    </script>
</body>
</html>
