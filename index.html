<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¿Quieres ser mi Valentín?</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fce4ec; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #d81b60; font-size: 2rem; }
        .buttons { margin-top: 30px; position: relative; height: 50px; }
        button { padding: 15px 30px; font-size: 1.2rem; border-radius: 10px; border: none; cursor: pointer; transition: 0.3s; }
        #yesBtn { background-color: #e91e63; color: white; }
        #noBtn { background-color: #cfd8dc; color: #546e7a; position: absolute; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eHByZzR0bm8ycXp6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3ImZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/c76IJLufpNUMo/giphy.gif" width="150">
        <h1>[Nombre de tu novia], ¿quieres ser mi Valentín?</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="alert('¡Sabía que dirías que sí! ❤️')">Sí</button>
            <button id="noBtn" onmouseover="moveButton()">No</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            document.getElementById('noBtn').style.left = x + 'px';
            document.getElementById('noBtn').style.top = y + 'px';
        }
    </script>
</body>
</html>
